<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" role="img" aria-labelledby="title desc">
  <title id="title">M4d-B4C Studio</title>
  <desc id="desc">Logo textual M4d-B4C Studio em azul e dourado sobre fundo escuro.</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7ee7ff"/>
      <stop offset="52%" stop-color="#2fa8ff"/>
      <stop offset="100%" stop-color="#0b356f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="55%" stop-color="#ff9a2e"/>
      <stop offset="100%" stop-color="#7b2d09"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1080" height="420" rx="28" fill="#070b1b"/>
  <text x="54" y="236" font-family="Arial Black, Impact, sans-serif" font-size="142" letter-spacing="-6" fill="url(#blue)" stroke="#81e8ff" stroke-width="1.6" filter="url(#glow)">M4d_</text>
  <text x="520" y="236" font-family="Arial Black, Impact, sans-serif" font-size="142" letter-spacing="-6" fill="url(#gold)" stroke="#ffd27a" stroke-width="1.6" filter="url(#glow)">B4C</text>
  <g opacity=".9">
    <rect x="720" y="74" width="10" height="18" fill="#6fdfff"/>
    <rect x="746" y="92" width="8" height="14" fill="#39baf8"/>
    <rect x="774" y="68" width="12" height="26" fill="#86e9ff"/>
    <rect x="806" y="86" width="9" height="18" fill="#ffb856"/>
    <rect x="835" y="106" width="8" height="12" fill="#55ccff"/>
    <rect x="865" y="80" width="12" height="20" fill="#ffc26b"/>
    <rect x="894" y="114" width="7" height="13" fill="#31aef5"/>
    <rect x="924" y="98" width="10" height="19" fill="#ff9a2e"/>
  </g>
  <text x="60" y="296" font-family="Inter, Arial, sans-serif" font-size="28" letter-spacing="10" fill="#ffffff" opacity=".38">CRYPTO ART · NFT ARTIST · STUDIO</text>
</svg>
